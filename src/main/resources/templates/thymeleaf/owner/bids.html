<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ставки по аукциону</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="page-shell single-engine">
    <main class="content full-width-content">
        <section class="hero-card">
            <div>
                <p class="eyebrow">OWNER</p>
                <h2 th:text="|Ставки по аукциону #${auctionId}|">Ставки по аукциону</h2>
                <p>Полная история ставок по выбранному лоту владельца.</p>
            </div>
            <div class="hero-actions">
                <a class="secondary-link" th:href="@{/thymeleaf/owner/dashboard}">Назад</a>
                <a class="secondary-link" th:href="@{/thymeleaf/auctions}">Каталог</a>
                <a class="secondary-link" th:href="@{/logout}">Выход</a>
                <select onchange="window.location.href=this.value">
                    <option th:value="@{'/thymeleaf/owner/auctions/' + ${auctionId} + '/bids'}" selected>Thymeleaf</option>
                    <option th:value="@{'/mustache/owner/auctions/' + ${auctionId} + '/bids'}">Mustache</option>
                    <option th:value="@{'/freemarker/owner/auctions/' + ${auctionId} + '/bids'}">FreeMarker</option>
                </select>
            </div>
        </section>

        <div class="alert success" th:if="${successMessage}" th:text="${successMessage}"></div>
        <div class="alert error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <section class="panel-card">
            <div class="table-list">
                <div class="table-row" th:each="bid : ${auctionBids}">
                    <div>
                        <strong th:text="${bid.bidderUsername}">user</strong>
                        <p th:text="${bid.formattedBidTime}">time</p>
                    </div>
                    <div>
                        <strong th:text="${bid.amount}">0</strong>
                        <p th:text="${bid.auctionStatus}">ACTIVE</p>
                    </div>
                </div>
                <div class="empty-state" th:if="${#lists.isEmpty(auctionBids)}">По этому аукциону ставок пока нет.</div>
            </div>
        </section>
    </main>
</div>
</body>
</html>
