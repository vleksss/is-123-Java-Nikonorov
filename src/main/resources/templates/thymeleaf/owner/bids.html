<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ставки по аукциону</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="page-shell">
    <aside class="sidebar">
        <div class="brand-card">
            <span class="brand-badge">Owner</span>
            <h1>История ставок</h1>
            <p>Полный список ставок по выбранному аукциону владельца.</p>
        </div>
        <nav class="side-nav">
            <a th:href="@{/thymeleaf/auctions}">Каталог</a>
            <a th:href="@{/profile}">Мой кабинет</a>
            <a class="active" th:href="@{/owner/dashboard}">Кабинет владельца</a>
            <a th:href="@{/logout}">Выход</a>
        </nav>
    </aside>

    <main class="content">
        <section class="hero-card">
            <div>
                <p class="eyebrow">Аукцион</p>
                <h2 th:text="|История ставок по лоту #${auctionId}|">История ставок</h2>
                <p>Список отсортирован по размеру ставки от максимальной к минимальной.</p>
            </div>
            <div class="hero-actions">
                <a class="secondary-link" th:href="@{/owner/dashboard}">Назад к моим аукционам</a>
            </div>
        </section>

        <div class="alert success" th:if="${successMessage}" th:text="${successMessage}"></div>
        <div class="alert error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <section class="panel-card">
            <div class="table-list">
                <div class="table-row" th:each="bid : ${auctionBids}">
                    <div>
                        <strong th:text="${bid.bidderUsername}">user</strong>
                        <p th:text="${#temporals.format(bid.bidTime, 'dd.MM.yyyy HH:mm')}">date</p>
                    </div>
                    <div>
                        <strong th:text="${bid.amount}">0</strong>
                        <p th:text="${bid.auctionStatus}">ACTIVE</p>
                    </div>
                </div>
                <div class="empty-state" th:if="${#lists.isEmpty(auctionBids)}">По этому аукциону ставок пока нет.</div>
            </div>
        </section>
    </main>
</div>
</body>
</html>
