<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Кабинет владельца</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="page-shell single-engine">
    <main class="content full-width-content">
        <section class="hero-card">
            <div>
                <p class="eyebrow">OWNER</p>
                <h2 th:text="|Кабинет владельца — ${currentUsername}|">Кабинет владельца</h2>
                <p>Создание лотов, просмотр собственных аукционов и история ставок по каждому лоту.</p>
            </div>
            <div class="hero-actions">
                <a class="secondary-link" th:href="@{/thymeleaf/auctions}">Каталог</a>
                <a class="secondary-link" th:href="@{/thymeleaf/profile}">Профиль</a>
                <a class="secondary-link" th:if="${isAdmin}" th:href="@{/thymeleaf/admin/dashboard}">Админка</a>
                <a class="secondary-link" th:href="@{/logout}">Выход</a>
                <select onchange="window.location.href=this.value">
                    <option th:value="@{/thymeleaf/owner/dashboard}" selected>Thymeleaf</option>
                    <option th:value="@{/mustache/owner/dashboard}">Mustache</option>
                    <option th:value="@{/freemarker/owner/dashboard}">FreeMarker</option>
                </select>
            </div>
        </section>

        <div class="alert success" th:if="${successMessage}" th:text="${successMessage}"></div>
        <div class="alert error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <section class="panel-card">
            <div class="section-heading">
                <div>
                    <p class="eyebrow">CREATE</p>
                    <h3>Новый аукцион</h3>
                </div>
            </div>
            <form th:action="@{/owner/auctions}" method="post" class="form-grid two-columns">
                <label>Название
                    <input type="text" name="title" required>
                </label>
                <label>Начальная цена
                    <input type="number" step="0.01" name="startPrice" required>
                </label>
                <label class="full-width">Описание
                    <textarea name="description" rows="4" required></textarea>
                </label>
                <label>Дата начала
                    <input type="datetime-local" name="startTime" required>
                </label>
                <label>Дата окончания
                    <input type="datetime-local" name="endTime" required>
                </label>
                <button class="primary-button full-width" type="submit">Создать лот</button>
            </form>
        </section>

        <section class="auction-grid">
            <article class="auction-card" th:each="auction : ${ownerAuctions}">
                <span class="tag" th:text="${auction.status}">ACTIVE</span>
                <h4 th:text="${auction.title}">title</h4>

                <div class="detail-row">
                    <span>Текущая цена</span>
                    <strong th:text="${auction.currentPrice}">0</strong>
                </div>
                <div class="detail-row">
                    <span>Окончание</span>
                    <strong th:text="${auction.formattedEndTime}">date</strong>
                </div>

                <div class="row-actions compact-form">
                    <a class="secondary-link" th:href="@{'/thymeleaf/owner/auctions/' + ${auction.id} + '/bids'}">История ставок</a>
                    <form th:action="@{'/owner/auctions/' + ${auction.id} + '/close'}" method="post">
                        <button class="danger-button" type="submit">Закрыть</button>
                    </form>
                </div>
            </article>
        </section>
    </main>
</div>
</body>
</html>
