<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Аукционы</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="page-shell single-engine">
    <main class="content full-width-content">
        <section class="hero-card">
            <div>
                <p class="eyebrow">CATALOG</p>
                <h2 th:text="|Каталог аукционов — ${currentUsername}|">Каталог аукционов</h2>
                <p>Полный список лотов, ставки и управление страницами через единый интерфейс.</p>
            </div>
            <div class="hero-actions">
                <a class="secondary-link" th:href="@{/thymeleaf/profile}">Профиль</a>
                <a class="secondary-link" th:if="${isOwner}" th:href="@{/thymeleaf/owner/dashboard}">Кабинет владельца</a>
                <a class="secondary-link" th:if="${isAdmin}" th:href="@{/thymeleaf/admin/dashboard}">Админка</a>
                <a class="secondary-link" th:href="@{/logout}">Выход</a>
                <select onchange="window.location.href=this.value">
                    <option th:value="@{/thymeleaf/auctions}" selected>Thymeleaf</option>
                    <option th:value="@{/mustache/auctions}">Mustache</option>
                    <option th:value="@{/freemarker/auctions}">FreeMarker</option>
                </select>
            </div>
        </section>

        <div class="alert success" th:if="${successMessage}" th:text="${successMessage}"></div>
        <div class="alert error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <section class="panel-card" th:if="${canCreateAuction}">
            <div class="section-heading">
                <div>
                    <p class="eyebrow">OWNER</p>
                    <h3>Создать аукцион</h3>
                </div>
            </div>
            <form th:action="@{/owner/auctions}" method="post" class="form-grid two-columns">
                <label>Название
                    <input type="text" name="title" required>
                </label>
                <label>Начальная цена
                    <input type="number" step="0.01" name="startPrice" required>
                </label>
                <label class="full-width">Описание
                    <textarea name="description" rows="4" required></textarea>
                </label>
                <label>Дата начала
                    <input type="datetime-local" name="startTime" required>
                </label>
                <label>Дата окончания
                    <input type="datetime-local" name="endTime" required>
                </label>
                <button class="primary-button full-width" type="submit">Создать лот</button>
            </form>
        </section>

        <section class="auction-grid">
            <article class="auction-card" th:each="auction : ${auctions}">
                <span class="tag" th:text="${auction.status}">ACTIVE</span>
                <h4 th:text="${auction.title}">title</h4>
                <p class="auction-description" th:text="${auction.description}">description</p>

                <div class="detail-row">
                    <span>Владелец</span>
                    <strong th:text="${auction.ownerUsername}">owner</strong>
                </div>
                <div class="detail-row">
                    <span>Стартовая цена</span>
                    <strong th:text="${auction.startPrice}">0</strong>
                </div>
                <div class="detail-row">
                    <span>Текущая цена</span>
                    <strong th:text="${auction.currentPrice}">0</strong>
                </div>
                <div class="detail-row">
                    <span>Окончание</span>
                    <strong th:text="${auction.formattedEndTime}">date</strong>
                </div>

                <form class="form-grid compact-form" th:action="@{/bids}" method="post">
                    <input type="hidden" name="auctionId" th:value="${auction.id}">
                    <label>Сумма ставки
                        <input type="number" step="0.01" name="amount" required>
                    </label>
                    <button class="primary-button" type="submit">Сделать ставку</button>
                </form>
            </article>
        </section>
    </main>
</div>
</body>
</html>
