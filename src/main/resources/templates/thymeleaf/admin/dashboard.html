<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Админка</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="page-shell single-engine">
    <main class="content full-width-content">
        <section class="hero-card">
            <div>
                <p class="eyebrow">ADMIN</p>
                <h2 th:text="|Панель администратора — ${currentUsername}|">Панель администратора</h2>
                <p>Управление пользователями и всеми аукционами системы.</p>
            </div>
            <div class="hero-actions">
                <a class="secondary-link" th:href="@{/thymeleaf/auctions}">Каталог</a>
                <a class="secondary-link" th:href="@{/thymeleaf/profile}">Профиль</a>
                <a class="secondary-link" th:if="${isOwner}" th:href="@{/thymeleaf/owner/dashboard}">Кабинет владельца</a>
                <a class="secondary-link" th:href="@{/logout}">Выход</a>
                <select onchange="window.location.href=this.value">
                    <option th:value="@{/thymeleaf/admin/dashboard}" selected>Thymeleaf</option>
                    <option th:value="@{/mustache/admin/dashboard}">Mustache</option>
                    <option th:value="@{/freemarker/admin/dashboard}">FreeMarker</option>
                </select>
            </div>
        </section>

        <div class="alert success" th:if="${successMessage}" th:text="${successMessage}"></div>
        <div class="alert error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <div class="dashboard-grid wide-grid">
            <section class="panel-card">
                <div class="section-heading">
                    <div>
                        <p class="eyebrow">USERS</p>
                        <h3>Пользователи</h3>
                    </div>
                </div>

                <div class="table-list">
                    <div class="table-row with-actions" th:each="user : ${users}">
                        <div>
                            <strong th:text="${user.username}">user</strong>
                            <p th:text="${user.email}">mail</p>
                        </div>
                        <div>
                            <strong th:text="${user.role}">USER</strong>
                            <p th:text="${user.enabled ? 'Активен' : 'Заблокирован'}">status</p>
                        </div>
                        <div class="row-actions stacked-actions">
                            <div th:if="${user.protectedUser}" class="tag">Недоступно</div>
                            <div th:unless="${user.protectedUser}" class="row-actions stacked-actions">
                                <form th:action="@{'/admin/users/' + ${user.id} + '/status'}" method="post">
                                    <input type="hidden" name="enabled" th:value="${user.nextEnabledValue}">
                                    <button class="danger-button" type="submit" th:text="${user.statusActionLabel}">Статус</button>
                                </form>
                                <form th:action="@{'/admin/users/' + ${user.id} + '/role'}" method="post">
                                    <input type="hidden" name="role" value="USER">
                                    <button class="secondary-button" type="submit">Сделать USER</button>
                                </form>
                                <form th:action="@{'/admin/users/' + ${user.id} + '/role'}" method="post">
                                    <input type="hidden" name="role" value="OWNER">
                                    <button class="secondary-button" type="submit">Сделать OWNER</button>
                                </form>
                                <form th:action="@{'/admin/users/' + ${user.id} + '/role'}" method="post">
                                    <input type="hidden" name="role" value="ADMIN">
                                    <button class="secondary-button" type="submit">Сделать ADMIN</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="panel-card">
                <div class="section-heading">
                    <div>
                        <p class="eyebrow">AUCTIONS</p>
                        <h3>Все аукционы</h3>
                    </div>
                </div>

                <div class="table-list">
                    <div class="table-row with-actions" th:each="auction : ${allAuctions}">
                        <div>
                            <strong th:text="${auction.title}">title</strong>
                            <p th:text="${auction.ownerUsername}">owner</p>
                        </div>
                        <div>
                            <strong th:text="${auction.status}">ACTIVE</strong>
                            <p th:text="${auction.currentPrice}">0</p>
                        </div>
                        <div class="row-actions">
                            <form th:action="@{'/admin/auctions/' + ${auction.id} + '/close'}" method="post">
                                <button class="danger-button" type="submit">Закрыть аукцион</button>
                            </form>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>
</div>
</body>
</html>
