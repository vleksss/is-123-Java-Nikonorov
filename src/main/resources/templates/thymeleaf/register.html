<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container narrow">
    <h1>Регистрация</h1>
    <div class="error" th:if="${error}" th:text="${error}"></div>
    <form th:action="@{/register}" th:object="${registerRequest}" method="post" class="card form-grid">
        <label>Логин <input type="text" th:field="*{username}"></label>
        <label>Email <input type="email" th:field="*{email}"></label>
        <label>Пароль <input type="password" th:field="*{password}"></label>
        <button type="submit">Создать аккаунт</button>
    </form>
</div>
</body>
</html>
